id = "aws"
name = "AWS"
description = "Manage AWS resources via the official AWS API MCP server (AWS CLI commands through MCP)"
category = "cloud"
icon = "☁️"
tags = ["cloud", "amazon", "infrastructure", "s3", "ec2", "lambda", "devops"]

[transport]
type = "stdio"
command = "uvx"
args = ["awslabs.aws-api-mcp-server@latest"]

[[required_env]]
name = "AWS_ACCESS_KEY_ID"
label = "AWS Access Key ID"
help = "The access key ID from your AWS IAM credentials"
is_secret = true
get_url = "https://console.aws.amazon.com/iam/home#/security_credentials"

[[required_env]]
name = "AWS_SECRET_ACCESS_KEY"
label = "AWS Secret Access Key"
help = "The secret access key paired with your access key ID"
is_secret = true
get_url = "https://console.aws.amazon.com/iam/home#/security_credentials"

[[required_env]]
name = "AWS_REGION"
label = "AWS Region"
help = "The default AWS region to use (e.g., us-east-1, eu-west-1)"
is_secret = false
get_url = ""

[health_check]
interval_secs = 60
unhealthy_threshold = 3

setup_instructions = """
1. Install uv (https://docs.astral.sh/uv/getting-started/installation/) — required to run `uvx awslabs.aws-api-mcp-server`.
2. Create or select an IAM user with programmatic access in the AWS IAM Console.
3. Generate an access key pair and set AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_REGION.
4. Optionally set AWS_API_MCP_PROFILE_NAME to use a named profile from ~/.aws/credentials.
"""
